services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: invitacion-app
    container_name: invitacion-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - invitacion

  nginx:
    image: nginx:1.27-alpine
    container_name: invitacion-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - invitacion

  mysql:
    image: mysql:8.0
    container_name: invitacion-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-invitacion}
      MYSQL_USER: ${DB_USERNAME:-invitacion}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - invitacion

  node:
    image: node:22-alpine
    container_name: invitacion-node
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    networks:
      - invitacion

networks:
  invitacion:
    driver: bridge

volumes:
  dbdata:
    driver: local
