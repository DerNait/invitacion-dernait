services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    image: invitacion-app
    container_name: invitacion-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - invitacion

  nginx:
    image: nginx:1.27-alpine
    container_name: invitacion-nginx
    restart: unless-stopped
    # Solo escucha en localhost: el nginx del host (reverse proxy) hace el HTTPS.
    ports:
      - "127.0.0.1:${APP_PORT:-8090}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - invitacion

  mysql:
    image: mysql:8.0
    container_name: invitacion-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-invitacion}
      MYSQL_USER: ${DB_USERNAME:-invitacion}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
    # Sin "ports": la base no se expone al exterior, solo es accesible dentro de la red.
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - invitacion

networks:
  invitacion:
    driver: bridge

volumes:
  dbdata:
    driver: local
